# deploy.conf — Central configuration for MCP Signals Stack + LibreChat
# All scripts source this file. Edit once, applies everywhere.
# Override any value via environment: UBER_USER=other ./scripts/bootstrap-uberspace.sh

# ── Uberspace ──────────────────────────────────
UBER_USER="${UBER_USER:-assist}"
UBER_HOST="${UBER_HOST:-${UBER_USER}.uber.space}"

# ── GitHub ─────────────────────────────────────
GH_USER="${GH_USER:-ManuelKugelmann}"
GH_REPO_STACK="${GH_REPO_STACK:-TradingAssistant}"
GH_REPO="${GH_REPO:-$GH_REPO_STACK}"
GH_REPO_DATA="${GH_REPO_DATA:-TradeAssistant_Data}"

# ── Directories (resolved at runtime via $HOME) ─
STACK_DIR="${STACK_DIR:-$HOME/mcps}"
APP_DIR="${APP_DIR:-$HOME/LibreChat}"
DATA_DIR="${DATA_DIR:-$HOME/TradeAssistant_Data}"

# ── Ports ──────────────────────────────────────
LC_PORT="${LC_PORT:-3080}"

# ── Node.js ────────────────────────────────────
NODE_VERSION="${NODE_VERSION:-22}"
