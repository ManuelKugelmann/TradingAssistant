# LibreChat configuration
# MCP servers: utility (filesystem, memory, sqlite) + trading signals stack
version: 1.2.1

cache: true

registration:
  socialLogins: []

interface:
  endpointsMenu: true

# ── MCP Servers ─────────────────────────────
# Utility MCPs: data stored under ~/TradeAssistant_Data/ (git-versioned)
# Trading MCPs: signals stack under ~/mcps/
#
# IMPORTANT: setup.sh replaces __HOME__ with your actual $HOME path.
# If editing manually, replace __HOME__ with e.g. /home/youruser
mcpServers:

  # ── Utility ────────────────────────────────

  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - __HOME__/TradeAssistant_Data/files/
    serverInstructions: "Persistent file storage (git-synced). For documents, exports, reports."

  memory:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-memory"
    env:
      MEMORY_FILE_PATH: __HOME__/TradeAssistant_Data/memory.jsonl
    serverInstructions: "Knowledge graph memory. Store entities, relations, preferences across conversations."

  sqlite:
    command: npx
    args:
      - -y
      - mcp-sqlite
      - __HOME__/TradeAssistant_Data/data.db
    serverInstructions: "SQLite database for structured data. Full SQL supported."

  # ── Trading Server (signals store + 12 data domains, one process) ──
  # Runs as streamable-http so LibreChat injects per-user headers.
  # Env vars + API keys are set in the supervisord service, not here.

  trading:
    type: streamable-http
    url: http://localhost:8071/mcp
    headers:
      X-User-ID: "{{LIBRECHAT_USER_ID}}"
      X-User-Email: "{{LIBRECHAT_USER_EMAIL}}"
      X-Broker-Key: "{{BROKER_API_KEY}}"
      X-Broker-Secret: "{{BROKER_API_SECRET}}"
      X-Broker-Name: "{{BROKER_NAME}}"
      X-Risk-Daily-Limit: "{{RISK_DAILY_LIMIT}}"
      X-Risk-Live-Trading: "{{RISK_LIVE_TRADING}}"
    customUserVars:
      BROKER_API_KEY:
        title: "Broker API Key"
        description: "Your trading broker API key (e.g. Alpaca, IBKR). Leave blank for OSINT-only mode."
      BROKER_API_SECRET:
        title: "Broker API Secret"
        description: "Your trading broker API secret. Never shared with other users."
      BROKER_NAME:
        title: "Broker Name"
        description: "Your broker platform: alpaca, ibkr, binance, etc. Used to select the right API adapter."
      RISK_DAILY_LIMIT:
        title: "Daily Action Limit"
        description: "Max trading actions per day (default: 50). Set lower for safety."
      RISK_LIVE_TRADING:
        title: "Enable Live Trading"
        description: "Set to 'yes' to allow real trades. Leave blank for dry-run only (paper trading)."
    serverInstructions: |
      Trading signals server: store_* tools + 9 OSINT data domains.
      STORE: Profile = what an entity IS (JSON on disk). Snapshot = what was MEASURED when (MongoDB timeseries).
        store_chart returns Plotly HTML — output it directly as an artifact.
        Notes (store_save_note etc.) are per-user — plans, watchlists, journals.
        Risk gate: dry-run by default. Users enable live trading in Settings > Plugins.
      DATA: Tools prefixed by domain (weather_, disaster_, econ_, agri_, conflict_,
        commodity_, health_, politics_, transport_).
        Most free/no-key. Some need optional keys (FRED, ACLED, EIA, etc.).

